<head>

<body>


    <main>

        <h1 class="crono">cronômetro.Js</h1>
        <div class="timer">

            <h1 id="time" class="minutos">00</h1>
            <h2  class="separador">:</h2>
            <h1 id="time" class="segundos">00</h1>
            <h2 class="separador">:</h2>

        </div>

        <div class="buttons">

            <button id="btn" class="continue"><B>continue🟢</B></button>
            <button id="btn" class="start"><B>Start</B> 🟢</button>
            <button id="btn" class="restart"><b>Restart</b>🟡</button>

        </div>

    </main>
